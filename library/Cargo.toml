[package]
name = "p-never-nonce"
description = "Ensure a transaction does not include an advance nonce instruction"
version = "0.2.0"
readme = "../README.md"
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

[lib]
crate-type = ["rlib"]

[features]
cpi = ["pinocchio/cpi"]
instruction = ["dep:solana-address", "dep:solana-instruction"]

[dependencies]
pinocchio = { workspace = true }
solana-address = { workspace = true, optional = true }
solana-instruction = { workspace = true, optional = true }

[dev-dependencies]
p-never-nonce = { path =".", features = ["cpi", "instruction"] }
solana-address = { workspace = true, features = ["decode"] }

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true
rustdoc-args = ["--cfg=docsrs"]
